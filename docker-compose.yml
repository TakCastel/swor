# Développement : uniquement la base Postgres.
# L'API (php artisan serve) et le front (next dev) tournent en local.
services:
  db:
    image: postgres:16-alpine
    container_name: swor-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-54322}:5432"
    environment:
      POSTGRES_DB: swor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - swor-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  swor-db-data:
